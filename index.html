<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin: 0; background: #fff; color: #111; }
  #wrap { display: flex; flex-direction: column; align-items: center; width: min(560px, calc(100vw - 24px)); margin: 0 auto; padding: 2rem 0; font-family: var(--font-sans); gap: 1rem; }
  #hud { display: flex; justify-content: space-between; width: 100%; font-size: 14px; font-weight: 600; color: #333; }
  #score, #highScore { transition: color 120ms ease; }
  #score.is-record, #highScore.is-record { color: #188038; }
  canvas { display: block; width: 100%; height: auto; touch-action: none; }
  #hint { font-size: 13px; color: #555; }
  #touchControls { display: none; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
  .steerButton {
    min-height: 64px;
    border: 1px solid #bbb;
    border-radius: 8px;
    background: #f7f7f7;
    color: #222;
    font: 28px system-ui, sans-serif;
    touch-action: none;
    user-select: none;
  }
  #drawerToggle {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 2;
    border: 1px solid #bbb;
    background: #fff;
    color: #222;
    border-radius: 6px;
    padding: 7px 10px;
    font: 13px system-ui, sans-serif;
    cursor: pointer;
  }
  #drawer {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    width: min(360px, calc(100vw - 32px));
    box-sizing: border-box;
    padding: 54px 16px 16px;
    overflow: auto;
    background: rgba(255,255,255,0.96);
    border-right: 1px solid #ddd;
    box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    transform: translateX(-100%);
    transition: transform 160ms ease;
    z-index: 1;
    font: 13px system-ui, sans-serif;
  }
  #drawer.open { transform: translateX(0); }
  #drawer h2 { margin: 0 0 14px; font-size: 16px; }
  #drawer h3 { margin: 18px 0 10px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; color: #666; }
  .control { display: grid; gap: 6px; margin-bottom: 12px; }
  .control label { display: flex; justify-content: space-between; gap: 12px; color: #222; }
  .control output { color: #666; font-variant-numeric: tabular-nums; }
  .control input { width: 100%; }
  #printSettings {
    width: 100%;
    margin-top: 10px;
    border: 1px solid #999;
    background: #222;
    color: #fff;
    border-radius: 6px;
    padding: 9px 10px;
    font: 13px system-ui, sans-serif;
    cursor: pointer;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #111; color: #eee; }
    #drawerToggle { background: #222; color: #eee; border-color: #555; }
    #drawer { background: rgba(20,20,20,0.97); border-right-color: #333; box-shadow: 0 10px 30px rgba(0,0,0,0.45); }
    #drawer h3 { color: #aaa; }
    .control label { color: #eee; }
    .control output { color: #aaa; }
    #printSettings { background: #eee; color: #111; border-color: #eee; }
    #hud { color: #ddd; }
    #score.is-record, #highScore.is-record { color: #5ecb77; }
    .steerButton { background: #222; color: #eee; border-color: #555; }
    #hint { color: #aaa; }
  }

  @media (max-width: 680px) {
    #wrap { width: min(560px, calc(100vw - 16px)); padding: 4.5rem 0 1rem; gap: 0.75rem; }
    #touchControls { display: grid; }
    #hint { display: none; }
  }
</style>
<button id="drawerToggle">Tuning</button>
<aside id="drawer" aria-label="Game tuning">
  <div id="settingsControls"></div>
  <button id="printSettings">Console print</button>
</aside>
<div id="wrap">
  <div id="hud">
    <div id="score">Avoided: 0</div>
    <div id="highScore" class="is-record">High score: 0</div>
  </div>
  <canvas id="c" width="560" height="380"></canvas>
  <div id="hint">← → arrow keys to steer</div>
  <div id="touchControls" aria-label="Touch steering controls">
    <button class="steerButton" data-key="ArrowLeft" aria-label="Steer left">←</button>
    <button class="steerButton" data-key="ArrowRight" aria-label="Steer right">→</button>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');
const drawer = document.getElementById('drawer');
const drawerToggle = document.getElementById('drawerToggle');
const settingsControls = document.getElementById('settingsControls');
const printSettings = document.getElementById('printSettings');
const steerButtons = document.querySelectorAll('.steerButton');
const W = canvas.width, H = canvas.height;
const CX = W / 2;
const FRONT_R = 160;
const FRONT_CY = H - FRONT_R - 10;
const VP_Y = H * 0.52;
const NUM_WALL_LINES = 8;

// Z depth: objects move linearly in Z from Z_FAR toward Z_NEAR
// Perspective projection: screenScale = FOCAL / Z
const Z_NEAR = 1;
const Z_FAR  = 40;
const FOCAL  = Z_NEAR;

// Player
let playerAngle = 0;
let headingAngle = 0;
let slideSpeed = 0;
let playerDepthT = 0;
const keys = {};

const settings = {
  numSlices: 15,
  zSpeed: 0.12,

  turnSpeed: 0.080,
  turnReturnSpeed: 0.080,
  maxHeadingAngle: Math.PI / 3,
  slideAcceleration: 0.005,
  slideFriction: 0.95,
  edgeBounce: 0.35,
  maxPlayerDepthT: 0.5,
  playerDepthEasing: 0.04,
  depthSpeedReference: 0.4,
  playerHeight: 30,
  playerDotRadius: 6,

  obstacleRadius: 6,
  obstaclePositionSpread: Math.PI * 0.44,
  obstacleFrequency: 30,
  obstacleIntervalJitter: 0.45,
  minObstacleSpacingZ: 0.002,
  collisionDepthWindow: 0.045,
  hitHaloRadiusMultiplier: 4.2,
  hitHaloLineWidth: 4,
  hitLingerMs: 1500
};

const sliderSections = [
  {
    title: 'Player Turning Experience',
    controls: [
      ['turnSpeed', 'Turn speed', 0, 0.2, 0.001],
      ['turnReturnSpeed', 'Turn return speed', 0, 0.2, 0.001],
      ['maxHeadingAngle', 'Max heading angle', Math.PI / 12, Math.PI / 2, 0.01, 'deg'],
      ['slideAcceleration', 'Slide acceleration', 0, 0.02, 0.0001],
      ['slideFriction', 'Slide friction', 0.85, 0.995, 0.001],
      ['edgeBounce', 'Edge bounce', 0, 1, 0.01],
      ['maxPlayerDepthT', 'Max player depth', 0, 0.8, 0.01],
      ['playerDepthEasing', 'Depth easing', 0, 0.2, 0.001],
      ['depthSpeedReference', 'Depth speed reference', 0.02, 0.8, 0.005],
      ['playerHeight', 'Player height', 8, 70, 1],
      ['playerDotRadius', 'Player dot radius', 2, 16, 0.5]
    ]
  },
  {
    title: 'Speed & Difficulty',
    controls: [
      ['zSpeed', 'Tunnel speed', 0.01, 0.5, 0.005],
      ['numSlices', 'Tunnel slices', 4, 40, 1, 'int'],
      ['obstacleRadius', 'Obstacle radius', 2, 24, 0.5],
      ['obstaclePositionSpread', 'Obstacle position spread', Math.PI / 12, Math.PI / 2, 0.01, 'deg'],
      ['obstacleFrequency', 'Obstacle frequency', 1, 120, 1],
      ['obstacleIntervalJitter', 'Interval jitter', 0, 1, 0.01],
      ['minObstacleSpacingZ', 'Minimum spacing Z', 0.001, 8, 0.001],
      ['collisionDepthWindow', 'Collision depth window', 0.005, 0.25, 0.001],
      ['hitHaloRadiusMultiplier', 'Hit halo size', 1, 8, 0.1],
      ['hitHaloLineWidth', 'Hit halo line width', 1, 12, 0.5],
      ['hitLingerMs', 'Hit linger ms', 0, 3000, 50]
    ]
  }
];

// Arcs: evenly spaced Z values, cycling
const arcZs = [];
function initArcs() {
  arcZs.length = 0;
  for (let i = 0; i < settings.numSlices; i++) {
    arcZs.push(Z_NEAR + (Z_FAR - Z_NEAR) * (i / settings.numSlices));
  }
}
const obstacles = [];
let nextObstacleInZ = 0;
let avoidedStreak = 0;
let highScore = 0;
let hasHitObstacle = false;

initArcs();

function randomObstacleAngle() {
  return (Math.random() * 2 - 1) * settings.obstaclePositionSpread;
}

function nextObstacleSpacing() {
  const baseSpacing = (Z_FAR - Z_NEAR) / Math.max(1, settings.obstacleFrequency);
  const jitter = baseSpacing * settings.obstacleIntervalJitter;
  return Math.max(settings.minObstacleSpacingZ, baseSpacing + (Math.random() * 2 - 1) * jitter);
}

function spawnObstacle() {
  obstacles.push({
    z: Z_FAR,
    angle: randomObstacleAngle(),
    hit: false,
    lingerUntil: null
  });
}
nextObstacleInZ = nextObstacleSpacing();

function updateHud() {
  const isRecordRun = avoidedStreak > highScore;
  if (isRecordRun) highScore = avoidedStreak;

  scoreEl.textContent = `Avoided: ${avoidedStreak}`;
  highScoreEl.textContent = `High score: ${highScore}`;
  scoreEl.classList.toggle('is-record', isRecordRun);
  highScoreEl.classList.toggle('is-record', isRecordRun || !hasHitObstacle);
}

function formatSettingValue(value, kind) {
  if (kind === 'deg') return `${Math.round(value * 180 / Math.PI)} deg`;
  if (kind === 'int') return `${Math.round(value)}`;
  if (value >= 10) return value.toFixed(1);
  if (value >= 1) return value.toFixed(2);
  return value.toFixed(3);
}

function buildSettingsDrawer() {
  for (const section of sliderSections) {
    const heading = document.createElement('h3');
    heading.textContent = section.title;
    settingsControls.appendChild(heading);

    for (const [key, labelText, min, max, step, kind] of section.controls) {
      const row = document.createElement('div');
      const label = document.createElement('label');
      const labelSpan = document.createElement('span');
      const output = document.createElement('output');
      const input = document.createElement('input');

      row.className = 'control';
      labelSpan.textContent = labelText;
      output.value = formatSettingValue(settings[key], kind);
      input.type = 'range';
      input.min = min;
      input.max = max;
      input.step = step;
      input.value = settings[key];

      input.addEventListener('input', () => {
        const value = kind === 'int' ? Math.round(Number(input.value)) : Number(input.value);
        settings[key] = value;
        output.value = formatSettingValue(value, kind);
        if (key === 'numSlices') initArcs();
      });

      label.append(labelSpan, output);
      row.append(label, input);
      settingsControls.appendChild(row);
    }
  }
}

buildSettingsDrawer();

drawerToggle.addEventListener('click', () => {
  drawer.classList.toggle('open');
});

printSettings.addEventListener('click', () => {
  console.log(JSON.stringify(settings, null, 2));
});

const isDark = () => window.matchMedia('(prefers-color-scheme: dark)').matches;

// Project a Z depth value to a screen t in [0,1]
// t=0 → front (Z_NEAR), t=1 → back (Z_FAR)
function zToT(z) {
  // Perspective: scale = FOCAL/z, so things shrink with z
  const scale = FOCAL / z;
  // Normalize: at Z_NEAR scale=1 (full size), at Z_FAR scale=FOCAL/Z_FAR (tiny)
  const scaleNear = FOCAL / Z_NEAR;
  const scaleFar  = FOCAL / Z_FAR;
  return 1 - (scale - scaleFar) / (scaleNear - scaleFar);
}

function getSlice(t) {
  const cy = FRONT_CY + (VP_Y - FRONT_CY) * t;
  const r  = FRONT_R  * (1 - t * 0.94);
  return { cx: CX, cy, r };
}

function arcPoint(cx, cy, r, a) {
  return {
    x: cx + r * Math.cos(Math.PI / 2 + a),
    y: cy + r * Math.sin(Math.PI / 2 + a)
  };
}

function getObstacleCircle(obstacle) {
  const t = zToT(obstacle.z);
  const s = getSlice(t);
  const pos = arcPoint(s.cx, s.cy, s.r, obstacle.angle);
  return {
    x: pos.x,
    y: pos.y,
    r: settings.obstacleRadius * (s.r / FRONT_R),
    t
  };
}

function getPlayerCircle() {
  const playerSlice = getSlice(playerDepthT);
  const playerScale = 1 - playerDepthT * 0.6;
  const pos = arcPoint(playerSlice.cx, playerSlice.cy, playerSlice.r, playerAngle);
  return {
    x: pos.x,
    y: pos.y,
    r: settings.playerDotRadius * playerScale,
    scale: playerScale
  };
}

function circlesOverlap(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  const minDistance = a.r + b.r;
  return dx * dx + dy * dy <= minDistance * minDistance;
}

function draw() {
  const dark = isDark();
  ctx.clearRect(0, 0, W, H);

  const rimA      = dark ? 'rgba(200,188,255,' : 'rgba(60,52,160,';
  const edgeColor = dark ? 'rgba(200,188,255,0.45)' : 'rgba(60,52,160,0.35)';
  const gridA     = dark ? 'rgba(200,188,255,0.13)' : 'rgba(60,52,160,0.10)';
  const obstacleFill = dark ? '#ff9b74' : '#b84a24';
  const obstacleStroke = dark ? '#ffd0bf' : '#6e260f';
  const hitHalo = dark ? 'rgba(255,68,68,0.7)' : 'rgba(210,0,0,0.65)';
  const frontSlice = getSlice(0);
  const backSlice  = getSlice(1);
  const leftFront  = arcPoint(frontSlice.cx, frontSlice.cy, frontSlice.r, -Math.PI/2);
  const rightFront = arcPoint(frontSlice.cx, frontSlice.cy, frontSlice.r,  Math.PI/2);
  const leftBack   = arcPoint(backSlice.cx,  backSlice.cy,  backSlice.r,  -Math.PI/2);
  const rightBack  = arcPoint(backSlice.cx,  backSlice.cy,  backSlice.r,   Math.PI/2);

  ctx.beginPath(); ctx.moveTo(leftFront.x, leftFront.y); ctx.lineTo(leftBack.x, leftBack.y);
  ctx.strokeStyle = edgeColor; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rightFront.x, rightFront.y); ctx.lineTo(rightBack.x, rightBack.y);
  ctx.strokeStyle = edgeColor; ctx.lineWidth = 1.5; ctx.stroke();

  for (let li = 1; li < NUM_WALL_LINES; li++) {
    const a = -Math.PI/2 + (Math.PI / NUM_WALL_LINES) * li;
    const pFront = arcPoint(frontSlice.cx, frontSlice.cy, frontSlice.r, a);
    const pBack  = arcPoint(backSlice.cx,  backSlice.cy,  backSlice.r,  a);
    ctx.beginPath(); ctx.moveTo(pFront.x, pFront.y); ctx.lineTo(pBack.x, pBack.y);
    ctx.strokeStyle = gridA; ctx.lineWidth = 0.8; ctx.stroke();
  }

  // Draw arcs back to front
  const arcsCopy = [...arcZs].sort((a, b) => b - a);
  for (const z of arcsCopy) {
    const t = zToT(z);
    if (t < 0.01 || t > 0.99) continue;
    const s = getSlice(t);
    const alpha = 0.1 + (1 - t) * 0.65;
    const lw    = 0.4 + (1 - t) * 2.0;
    ctx.beginPath();
    ctx.arc(s.cx, s.cy, s.r, 0, Math.PI);
    ctx.strokeStyle = rimA + alpha + ')';
    ctx.lineWidth = lw;
    ctx.stroke();
  }

  // Front arc always on top
  ctx.beginPath();
  ctx.arc(frontSlice.cx, frontSlice.cy, frontSlice.r, 0, Math.PI);
  ctx.strokeStyle = rimA + '0.9)'; ctx.lineWidth = 3; ctx.stroke();

  const obstaclesCopy = [...obstacles].sort((a, b) => b.z - a.z);
  for (const obstacle of obstaclesCopy) {
    const obstacleCircle = getObstacleCircle(obstacle);
    if ((obstacleCircle.t < 0.01 && obstacle.lingerUntil === null) || obstacleCircle.t > 0.99) continue;

    if (obstacle.hit) {
      ctx.beginPath();
      ctx.arc(obstacleCircle.x, obstacleCircle.y, obstacleCircle.r * settings.hitHaloRadiusMultiplier, 0, Math.PI * 2);
      ctx.strokeStyle = hitHalo;
      ctx.lineWidth = settings.hitHaloLineWidth;
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(obstacleCircle.x, obstacleCircle.y, obstacleCircle.r, 0, Math.PI * 2);
    ctx.fillStyle = obstacleFill;
    ctx.fill();
    ctx.strokeStyle = obstacleStroke;
    ctx.lineWidth = Math.max(1, obstacleCircle.r * 0.25);
    ctx.stroke();
  }

  // Player
  const playerCircle = getPlayerCircle();
  const nx = Math.cos(Math.PI / 2 + playerAngle);
  const ny = Math.sin(Math.PI / 2 + playerAngle);
  const tx = -Math.cos(playerAngle);
  const ty = -Math.sin(playerAngle);
  const leanX = -nx * Math.cos(headingAngle) + tx * Math.sin(headingAngle);
  const leanY = -ny * Math.cos(headingAngle) + ty * Math.sin(headingAngle);
  const playerColor = dark ? '#e8e0ff' : '#3c34a0';
  ctx.beginPath(); ctx.moveTo(playerCircle.x, playerCircle.y);
  ctx.lineTo(playerCircle.x + leanX * settings.playerHeight * playerCircle.scale, playerCircle.y + leanY * settings.playerHeight * playerCircle.scale);
  ctx.strokeStyle = playerColor; ctx.lineWidth = 3.5 * playerCircle.scale; ctx.lineCap = 'round'; ctx.stroke();
  ctx.beginPath(); ctx.arc(playerCircle.x, playerCircle.y, playerCircle.r, 0, Math.PI * 2);
  ctx.fillStyle = playerColor; ctx.fill();
}

function loop() {
  if (keys['ArrowLeft'])  headingAngle += settings.turnSpeed;
  if (keys['ArrowRight']) headingAngle -= settings.turnSpeed;
  if (!keys['ArrowLeft'] && !keys['ArrowRight']) {
    if (Math.abs(headingAngle) <= settings.turnReturnSpeed) {
      headingAngle = 0;
    } else {
      headingAngle -= Math.sign(headingAngle) * settings.turnReturnSpeed;
    }
  }
  headingAngle = Math.max(-settings.maxHeadingAngle, Math.min(settings.maxHeadingAngle, headingAngle));

  slideSpeed += Math.sin(headingAngle) * settings.slideAcceleration;
  slideSpeed *= settings.slideFriction;
  playerAngle += slideSpeed;

  const turnAmount = Math.abs(headingAngle) / settings.maxHeadingAngle;
  const speedAmount = Math.min(1, Math.abs(slideSpeed) / settings.depthSpeedReference);
  const targetDepthT = settings.maxPlayerDepthT * Math.min(1, turnAmount * 0.7 + speedAmount * 0.3);
  playerDepthT += (targetDepthT - playerDepthT) * settings.playerDepthEasing;

  if (playerAngle > Math.PI / 2) {
    playerAngle = Math.PI / 2;
    slideSpeed *= -settings.edgeBounce;
  }
  if (playerAngle < -Math.PI / 2) {
    playerAngle = -Math.PI / 2;
    slideSpeed *= -settings.edgeBounce;
  }

  // Move all arcs forward in Z (toward Z_NEAR), wrap back to Z_FAR when they pass front
  for (let i = 0; i < arcZs.length; i++) {
    arcZs[i] -= settings.zSpeed;
    if (arcZs[i] <= Z_NEAR) arcZs[i] += (Z_FAR - Z_NEAR);
  }

  nextObstacleInZ -= settings.zSpeed;
  while (nextObstacleInZ <= 0) {
    spawnObstacle();
    nextObstacleInZ += nextObstacleSpacing();
  }

  const playerCircle = getPlayerCircle();
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const obstacle = obstacles[i];
    if (obstacle.lingerUntil === null) {
      obstacle.z -= settings.zSpeed;
    }

    const obstacleCircle = getObstacleCircle(obstacle);
    const isCloseInDepth = Math.abs(obstacleCircle.t - playerDepthT) <= settings.collisionDepthWindow;
    if (!obstacle.hit && isCloseInDepth && circlesOverlap(playerCircle, obstacleCircle)) {
      obstacle.hit = true;
      avoidedStreak = 0;
      hasHitObstacle = true;
      updateHud();
    }

    if (obstacle.z <= Z_NEAR) {
      if (!obstacle.hit) {
        avoidedStreak++;
        updateHud();
        obstacles.splice(i, 1);
      } else if (obstacle.lingerUntil === null) {
        obstacle.z = Z_NEAR;
        obstacle.lingerUntil = performance.now() + settings.hitLingerMs;
      } else if (performance.now() >= obstacle.lingerUntil) {
        obstacles.splice(i, 1);
      }
    }
  }

  draw();
  requestAnimationFrame(loop);
}

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key.startsWith('Arrow')) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

for (const button of steerButtons) {
  const key = button.dataset.key;
  const setPressed = pressed => { keys[key] = pressed; };

  button.addEventListener('pointerdown', e => {
    e.preventDefault();
    button.setPointerCapture(e.pointerId);
    setPressed(true);
  });
  button.addEventListener('pointerup', () => setPressed(false));
  button.addEventListener('pointercancel', () => setPressed(false));
  button.addEventListener('lostpointercapture', () => setPressed(false));
}

updateHud();
loop();
</script>
