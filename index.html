<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin: 0; background: #111; color: #eee; }
  body.day { background: #fff; color: #111; }
  #wrap { display: flex; flex-direction: column; align-items: center; width: min(900px, calc(100vw - 24px)); margin: 0 auto; padding: 1rem 0; font-family: var(--font-sans); gap: 1rem; }
  #hud {
    display: flex;
    justify-content: space-between;
    width: 100%;
    color: #ddd;
    font: 700 22px "Courier New", Consolas, "Lucida Console", monospace;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  body.day #hud { color: #333; }
  #score, #highScore { transition: color 120ms ease; }
  #score.is-record, #highScore.is-record { color: #5ecb77; text-shadow: 0 0 10px rgba(94,203,119,0.5); }
  body.day #score.is-record, body.day #highScore.is-record { color: #188038; text-shadow: none; }
  canvas { display: block; width: 100%; height: auto; touch-action: none; }
  #hint { font-size: 13px; color: #aaa; }
  body.day #hint { color: #555; }
  #touchControls { display: none; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
  .steerButton {
    min-height: 64px;
    border: 1px solid #bbb;
    border-radius: 8px;
    background: #222;
    color: #eee;
    border-color: #555;
    font: 28px system-ui, sans-serif;
    touch-action: none;
    user-select: none;
  }
  body.day .steerButton { background: #f7f7f7; color: #222; border-color: #bbb; }
  #drawerToggle, #themeToggle {
    position: fixed;
    top: 12px;
    z-index: 2;
    border: 1px solid #555;
    background: #222;
    color: #eee;
    border-radius: 6px;
    padding: 7px 10px;
    font: 13px system-ui, sans-serif;
    cursor: pointer;
  }
  #drawerToggle { left: 12px; }
  #themeToggle { right: 12px; }
  body.day #drawerToggle, body.day #themeToggle { background: #fff; color: #222; border-color: #bbb; }
  #drawer {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    width: min(420px, calc(100vw - 32px));
    box-sizing: border-box;
    padding: 54px 16px 16px;
    overflow: auto;
    background: rgba(20,20,20,0.97);
    border-right: 1px solid #333;
    box-shadow: 0 10px 30px rgba(0,0,0,0.45);
    transform: translateX(-100%);
    transition: transform 160ms ease;
    z-index: 1;
    font: 13px system-ui, sans-serif;
  }
  #drawer.open { transform: translateX(0); }
  #drawer h2 { margin: 0 0 14px; font-size: 16px; }
  #drawer details { border-top: 1px solid #333; padding: 8px 0; }
  #drawer details:first-child { border-top: 0; }
  #drawer summary { cursor: pointer; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: #aaa; }
  .control { display: grid; gap: 6px; margin-bottom: 12px; }
  .control label { display: flex; align-items: center; justify-content: space-between; gap: 12px; color: #eee; }
  .controlName { display: inline-flex; align-items: center; gap: 6px; }
  .infoButton {
    display: inline-grid;
    place-items: center;
    width: 18px;
    height: 18px;
    border: 1px solid #666;
    border-radius: 50%;
    background: transparent;
    color: inherit;
    font: 700 12px system-ui, sans-serif;
    padding: 0;
    cursor: pointer;
  }
  .infoText {
    display: none;
    border: 1px solid #444;
    border-radius: 6px;
    background: #181818;
    color: #ddd;
    padding: 8px;
    line-height: 1.35;
  }
  .control.showInfo .infoText { display: block; }
  .control output { color: #aaa; font-variant-numeric: tabular-nums; }
  .control input { width: 100%; }
  #settingsActions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  #applySettings, #resetSettings {
    margin-top: 10px;
    border: 1px solid #999;
    background: #eee;
    color: #111;
    border-radius: 6px;
    padding: 9px 10px;
    font: 13px system-ui, sans-serif;
    cursor: pointer;
  }
  #resetSettings { background: transparent; color: #eee; border-color: #555; }
  #settingsError { min-height: 18px; margin-top: 8px; color: #ff8a8a; font-size: 12px; line-height: 1.35; }
  #settingsOutput {
    box-sizing: border-box;
    width: 100%;
    min-height: 260px;
    margin-top: 10px;
    resize: vertical;
    border: 1px solid #444;
    border-radius: 6px;
    background: #111;
    color: #eee;
    padding: 10px;
    font: 12px "Courier New", Consolas, monospace;
  }

  body.day #drawer { background: rgba(255,255,255,0.96); border-right-color: #ddd; box-shadow: 0 10px 30px rgba(0,0,0,0.18); }
  body.day #drawer details { border-top-color: #ddd; }
  body.day #drawer summary { color: #666; }
  body.day .control label { color: #222; }
  body.day .infoButton { border-color: #aaa; }
  body.day .infoText { background: #f7f7f7; color: #333; border-color: #ddd; }
  body.day .control output { color: #666; }
  body.day #applySettings { background: #222; color: #fff; border-color: #999; }
  body.day #resetSettings { color: #222; border-color: #bbb; }
  body.day #settingsOutput { background: #fff; color: #111; border-color: #bbb; }

  @media (max-width: 680px) {
    #wrap { width: min(900px, calc(100vw - 16px)); padding: 4.5rem 0 1rem; gap: 0.75rem; }
    #hud { font-size: 17px; }
    #touchControls { display: grid; }
    #hint { display: none; }
  }
  canvas { border: 1px solid #333; border-radius: 8px; background: #000; }
</style>
<button id="drawerToggle">Tuning</button>
<button id="themeToggle">Night mode</button>
<aside id="drawer" aria-label="Game tuning">
  <div id="settingsControls"></div>
  <textarea id="settingsOutput" aria-label="Settings JSON"></textarea>
  <div id="settingsActions">
    <button id="applySettings">Apply</button>
    <button id="resetSettings">Reset to default</button>
  </div>
  <div id="settingsError" role="status" aria-live="polite"></div>
</aside>
<div id="wrap">
  <div id="hud">
    <div id="score">Avoided: 0</div>
    <div id="highScore" class="is-record">Highscore: 0</div>
  </div>
  <canvas id="c" width="560" height="380"></canvas>
  <div id="hint">← → arrow keys to steer</div>
  <div id="touchControls" aria-label="Touch steering controls">
    <button class="steerButton" data-key="ArrowLeft" aria-label="Steer left">←</button>
    <button class="steerButton" data-key="ArrowRight" aria-label="Steer right">→</button>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');
const drawer = document.getElementById('drawer');
const drawerToggle = document.getElementById('drawerToggle');
const themeToggle = document.getElementById('themeToggle');
const settingsControls = document.getElementById('settingsControls');
const settingsOutput = document.getElementById('settingsOutput');
const applySettings = document.getElementById('applySettings');
const resetSettings = document.getElementById('resetSettings');
const settingsError = document.getElementById('settingsError');
const steerButtons = document.querySelectorAll('.steerButton');
const VIEW = {
  canvasWidth: 860,
  canvasHeight: 540,
  frontRadiusRatio: 0.40,
  frontBottomPadding: 12,
  vanishingYRatio: 0.32,
  wallLines: 8,
  sliceRadiusShrink: 0.94
};
canvas.width = VIEW.canvasWidth;
canvas.height = VIEW.canvasHeight;
const W = canvas.width, H = canvas.height;
const CX = W / 2;
const FRONT_R = W * VIEW.frontRadiusRatio;
const FRONT_CY = H - FRONT_R - VIEW.frontBottomPadding;
const VP_Y = H * VIEW.vanishingYRatio;

// Z depth: objects move linearly in Z from Z_FAR toward Z_NEAR
// Perspective projection: screenScale = FOCAL / Z
const Z_NEAR = 1;
const Z_FAR  = 40;
const FOCAL  = Z_NEAR;

// Player
let playerAngle = 0;
let headingAngle = 0;
let slideSpeed = 0;
let playerDepthT = 0;
const keys = {};

// Paste JSON from the tuning drawer here to change the starting defaults.
const DEFAULT_SETTINGS = {
  "tunnel": {
    "numSlices": 15,
    "zSpeed": 0.095
  },
  "steering": {
    "turnSpeed": 0.171,
    "turnReturnSpeed": 0.166,
    "maxHeadingAngle": 1.29179938779915,
    "slideAcceleration": 0.0053,
    "slideFriction": 0.884,
    "edgeBounce": 0.35
  },
  "depth": {
    "maxPlayerDepthT": 0.5,
    "playerDepthEasing": 0.04,
    "depthSpeedReference": 0.4
  },
  "player": {
    "playerHeight": 39,
    "playerDotRadius": 10.5
  },
  "obstacles": {
    "obstacleRadius": 21,
    "obstaclePositionSpread": 1.56179938779915,
    "obstacleFrequency": 120,
    "obstacleIntervalJitter": 1,
    "minObstacleSpacingZ": 0.002,
    "collisionDepthWindow": 0.045
  },
  "hitEffects": {
    "hitHaloRadiusMultiplier": 2.5,
    "hitHaloLineWidth": 2.5,
    "hitLingerMs": 550
  }
};

let settings = cloneSettings(DEFAULT_SETTINGS);

const sliderSections = [
  {
    key: 'tunnel',
    title: 'Tunnel Flow',
    controls: [
      ['numSlices', 'Tunnel slices', 4, 40, 1, 'int', 'How many moving pipe rings are visible. More rings make the tunnel feel denser.'],
      ['zSpeed', 'Tunnel speed', 0.01, 0.5, 0.005, null, 'How fast rings and obstacles move toward the player.']
    ]
  },
  {
    key: 'steering',
    title: 'Steering',
    controls: [
      ['turnSpeed', 'Turn speed', 0, 0.2, 0.001, null, 'How quickly holding left or right rotates the player direction.'],
      ['turnReturnSpeed', 'Turn return speed', 0, 0.2, 0.001, null, 'How quickly the player direction recenters after releasing steering.'],
      ['maxHeadingAngle', 'Max heading angle', Math.PI / 12, Math.PI / 2, 0.01, 'deg', 'The largest angle the player can point away from straight down the pipe.'],
      ['slideAcceleration', 'Slide acceleration', 0, 0.02, 0.0001, null, 'How strongly the pointed direction turns into sideways movement.'],
      ['slideFriction', 'Slide friction', 0.85, 0.995, 0.001, null, 'How much sideways speed is preserved each frame. Higher values feel more slippery.'],
      ['edgeBounce', 'Edge bounce', 0, 1, 0.01, null, 'How much speed is reflected when hitting the pipe edge.']
    ]
  },
  {
    key: 'depth',
    title: 'Carving Depth',
    controls: [
      ['maxPlayerDepthT', 'Max player depth', 0, 0.8, 0.01, null, 'How far into the tunnel the player can visually drift while carving.'],
      ['playerDepthEasing', 'Depth easing', 0, 0.2, 0.001, null, 'How quickly the player eases toward the target visual depth.'],
      ['depthSpeedReference', 'Depth speed reference', 0.02, 0.8, 0.005, null, 'The slide speed needed before depth movement reaches full effect.']
    ]
  },
  {
    key: 'player',
    title: 'Player Shape',
    controls: [
      ['playerHeight', 'Player height', 8, 70, 1, null, 'Length of the player marker from base circle to direction tip.'],
      ['playerDotRadius', 'Player dot radius', 2, 16, 0.5, null, 'Radius of the player base circle used for drawing and collision.']
    ]
  },
  {
    key: 'obstacles',
    title: 'Obstacles',
    controls: [
      ['obstacleRadius', 'Obstacle radius', 2, 24, 0.5, null, 'Obstacle size at the front of the pipe.'],
      ['obstaclePositionSpread', 'Obstacle position spread', Math.PI / 12, Math.PI / 2, 0.01, 'deg', 'How much of the halfpipe width random obstacles can occupy.'],
      ['obstacleFrequency', 'Obstacle frequency', 1, 120, 1, null, 'Roughly how many obstacles exist across one full tunnel length.'],
      ['obstacleIntervalJitter', 'Interval jitter', 0, 1, 0.01, null, 'Random variation in spacing between obstacle spawns.'],
      ['minObstacleSpacingZ', 'Minimum spacing Z', 0.001, 8, 0.001, null, 'Smallest allowed distance between obstacle spawns in Z space.'],
      ['collisionDepthWindow', 'Collision depth window', 0.005, 0.25, 0.001, null, 'How close player and obstacle depth must be before circle collision counts.']
    ]
  },
  {
    key: 'hitEffects',
    title: 'Hit Effects',
    controls: [
      ['hitHaloRadiusMultiplier', 'Hit halo size', 1, 8, 0.1, null, 'How much larger the red hit circle is than the obstacle.'],
      ['hitHaloLineWidth', 'Hit halo line width', 1, 12, 0.5, null, 'Thickness of the red hit circle stroke.'],
      ['hitLingerMs', 'Hit linger ms', 0, 3000, 50, null, 'How long a hit obstacle waits on the front arc before disappearing.']
    ]
  }
];

// Arcs: evenly spaced Z values, cycling
const arcZs = [];
function initArcs() {
  arcZs.length = 0;
  for (let i = 0; i < settings.tunnel.numSlices; i++) {
    arcZs.push(Z_NEAR + (Z_FAR - Z_NEAR) * (i / settings.tunnel.numSlices));
  }
}
const obstacles = [];
let nextObstacleInZ = 0;
let avoidedStreak = 0;
let highScore = 0;
let hasHitObstacle = false;
let isRecordRun = false;

initArcs();

function randomObstacleAngle() {
  return (Math.random() * 2 - 1) * settings.obstacles.obstaclePositionSpread;
}

function nextObstacleSpacing() {
  const baseSpacing = (Z_FAR - Z_NEAR) / Math.max(1, settings.obstacles.obstacleFrequency);
  const jitter = baseSpacing * settings.obstacles.obstacleIntervalJitter;
  return Math.max(settings.obstacles.minObstacleSpacingZ, baseSpacing + (Math.random() * 2 - 1) * jitter);
}

function spawnObstacle() {
  obstacles.push({
    z: Z_FAR,
    angle: randomObstacleAngle(),
    hit: false,
    lingerUntil: null
  });
}
nextObstacleInZ = nextObstacleSpacing();

function updateHud() {
  isRecordRun = avoidedStreak > highScore;
  if (isRecordRun) highScore = avoidedStreak;

  scoreEl.textContent = `Avoided: ${avoidedStreak}`;
  highScoreEl.textContent = `Highscore: ${highScore}`;
  scoreEl.classList.toggle('is-record', isRecordRun);
  highScoreEl.classList.toggle('is-record', isRecordRun || !hasHitObstacle);
}

function isDark() {
  return !document.body.classList.contains('day');
}

function cloneSettings(source) {
  return JSON.parse(JSON.stringify(source));
}

function getSetting(group, key) {
  return settings[group][key];
}

function setSetting(group, key, value) {
  settings[group][key] = value;
}

function settingsToJson() {
  return JSON.stringify(settings, null, 2);
}

function syncSettingsOutput() {
  settingsOutput.value = settingsToJson();
}

function setSettingsError(message = '') {
  settingsError.textContent = message;
}

function formatSettingValue(value, kind) {
  if (kind === 'deg') return `${Math.round(value * 180 / Math.PI)} deg`;
  if (kind === 'int') return `${Math.round(value)}`;
  if (value >= 10) return value.toFixed(1);
  if (value >= 1) return value.toFixed(2);
  return value.toFixed(3);
}

function buildSettingsDrawer() {
  settingsControls.textContent = '';
  for (const section of sliderSections) {
    const details = document.createElement('details');
    const summary = document.createElement('summary');
    summary.textContent = section.title;
    details.open = section.key === 'tunnel' || section.key === 'steering';
    details.appendChild(summary);
    settingsControls.appendChild(details);

    for (const [key, labelText, min, max, step, kind, description] of section.controls) {
      const row = document.createElement('div');
      const label = document.createElement('label');
      const labelSpan = document.createElement('span');
      const nameSpan = document.createElement('span');
      const infoButton = document.createElement('button');
      const infoText = document.createElement('div');
      const output = document.createElement('output');
      const input = document.createElement('input');

      row.className = 'control';
      nameSpan.className = 'controlName';
      labelSpan.textContent = labelText;
      infoButton.className = 'infoButton';
      infoButton.type = 'button';
      infoButton.textContent = 'i';
      infoButton.setAttribute('aria-label', `${labelText} info`);
      infoText.className = 'infoText';
      infoText.textContent = description;
      output.value = formatSettingValue(getSetting(section.key, key), kind);
      input.type = 'range';
      input.min = min;
      input.max = max;
      input.step = step;
      input.value = getSetting(section.key, key);

      input.addEventListener('input', () => {
        const value = kind === 'int' ? Math.round(Number(input.value)) : Number(input.value);
        setSetting(section.key, key, value);
        output.value = formatSettingValue(value, kind);
        if (section.key === 'tunnel' && key === 'numSlices') initArcs();
        syncSettingsOutput();
        setSettingsError();
      });

      infoButton.addEventListener('click', () => {
        row.classList.toggle('showInfo');
      });

      nameSpan.append(labelSpan, infoButton);
      label.append(nameSpan, output);
      row.append(label, input, infoText);
      details.appendChild(row);
    }
  }
}

function refreshSliderControls() {
  settingsControls.textContent = '';
  buildSettingsDrawer();
}

function validateSettingsShape(candidate) {
  if (!candidate || typeof candidate !== 'object' || Array.isArray(candidate)) {
    return 'Settings must be a JSON object.';
  }

  for (const section of sliderSections) {
    const group = candidate[section.key];
    if (!group || typeof group !== 'object' || Array.isArray(group)) {
      return `Missing settings group "${section.key}".`;
    }

    for (const [key] of section.controls) {
      if (typeof group[key] !== 'number' || !Number.isFinite(group[key])) {
        return `Missing or invalid number at "${section.key}.${key}".`;
      }
    }
  }

  return '';
}

function applySettingsObject(nextSettings) {
  settings = cloneSettings(nextSettings);
  initArcs();
  nextObstacleInZ = nextObstacleSpacing();
  refreshSliderControls();
  syncSettingsOutput();
}

buildSettingsDrawer();
syncSettingsOutput();

drawerToggle.addEventListener('click', () => {
  drawer.classList.toggle('open');
});

themeToggle.addEventListener('click', () => {
  document.body.classList.toggle('day');
});

applySettings.addEventListener('click', () => {
  try {
    const parsed = JSON.parse(settingsOutput.value);
    const error = validateSettingsShape(parsed);
    if (error) {
      setSettingsError(error);
      return;
    }
    applySettingsObject(parsed);
    setSettingsError('Applied.');
  } catch (error) {
    setSettingsError(`Invalid JSON: ${error.message}`);
  }
});

resetSettings.addEventListener('click', () => {
  applySettingsObject(DEFAULT_SETTINGS);
  setSettingsError('Reset to defaults.');
});

// Project a Z depth value to a screen t in [0,1]
// t=0 → front (Z_NEAR), t=1 → back (Z_FAR)
function zToT(z) {
  // Perspective: scale = FOCAL/z, so things shrink with z
  const scale = FOCAL / z;
  // Normalize: at Z_NEAR scale=1 (full size), at Z_FAR scale=FOCAL/Z_FAR (tiny)
  const scaleNear = FOCAL / Z_NEAR;
  const scaleFar  = FOCAL / Z_FAR;
  return 1 - (scale - scaleFar) / (scaleNear - scaleFar);
}

function getSlice(t) {
  const cy = FRONT_CY + (VP_Y - FRONT_CY) * t;
  const r  = FRONT_R  * (1 - t * VIEW.sliceRadiusShrink);
  return { cx: CX, cy, r };
}

function arcPoint(cx, cy, r, a) {
  return {
    x: cx + r * Math.cos(Math.PI / 2 + a),
    y: cy + r * Math.sin(Math.PI / 2 + a)
  };
}

function getObstacleCircle(obstacle) {
  const t = zToT(obstacle.z);
  const s = getSlice(t);
  const pos = arcPoint(s.cx, s.cy, s.r, obstacle.angle);
  return {
    x: pos.x,
    y: pos.y,
    r: settings.obstacles.obstacleRadius * (s.r / FRONT_R),
    t
  };
}

function getPlayerCircle() {
  const playerSlice = getSlice(playerDepthT);
  const playerScale = 1 - playerDepthT * 0.6;
  const pos = arcPoint(playerSlice.cx, playerSlice.cy, playerSlice.r, playerAngle);
  return {
    x: pos.x,
    y: pos.y,
    r: settings.player.playerDotRadius * playerScale,
    scale: playerScale
  };
}

function circlesOverlap(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  const minDistance = a.r + b.r;
  return dx * dx + dy * dy <= minDistance * minDistance;
}

function draw() {
  const dark = isDark();
  ctx.clearRect(0, 0, W, H);

  const rimA      = isRecordRun ? 'rgba(94,203,119,' : (dark ? 'rgba(200,188,255,' : 'rgba(60,52,160,');
  const edgeColor = isRecordRun ? 'rgba(94,203,119,0.55)' : (dark ? 'rgba(200,188,255,0.55)' : 'rgba(60,52,160,0.55)');
  const gridA     = isRecordRun ? 'rgba(94,203,119,0.25)' : (dark ? 'rgba(200,188,255,0.25)' : 'rgba(60,52,160,0.25)');
  const obstacleFill = dark ? '#b84a24' : '#b84a24';
  const obstacleStroke = dark ? '#6e260f' : '#6e260f';
  const hitHalo = dark ? 'rgba(210,0,0,0.65)' : 'rgba(210,0,0,0.65)';
  const frontSlice = getSlice(0);
  const backSlice  = getSlice(1);
  const leftFront  = arcPoint(frontSlice.cx, frontSlice.cy, frontSlice.r, -Math.PI/2);
  const rightFront = arcPoint(frontSlice.cx, frontSlice.cy, frontSlice.r,  Math.PI/2);
  const leftBack   = arcPoint(backSlice.cx,  backSlice.cy,  backSlice.r,  -Math.PI/2);
  const rightBack  = arcPoint(backSlice.cx,  backSlice.cy,  backSlice.r,   Math.PI/2);

  ctx.beginPath(); ctx.moveTo(leftFront.x, leftFront.y); ctx.lineTo(leftBack.x, leftBack.y);
  ctx.strokeStyle = edgeColor; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rightFront.x, rightFront.y); ctx.lineTo(rightBack.x, rightBack.y);
  ctx.strokeStyle = edgeColor; ctx.lineWidth = 1.5; ctx.stroke();

  for (let li = 1; li < VIEW.wallLines; li++) {
    const a = -Math.PI/2 + (Math.PI / VIEW.wallLines) * li;
    const pFront = arcPoint(frontSlice.cx, frontSlice.cy, frontSlice.r, a);
    const pBack  = arcPoint(backSlice.cx,  backSlice.cy,  backSlice.r,  a);
    ctx.beginPath(); ctx.moveTo(pFront.x, pFront.y); ctx.lineTo(pBack.x, pBack.y);
    ctx.strokeStyle = gridA; ctx.lineWidth = 0.8; ctx.stroke();
  }

  // Draw arcs back to front
  const arcsCopy = [...arcZs].sort((a, b) => b - a);
  for (const z of arcsCopy) {
    const t = zToT(z);
    if (t < 0.01 || t > 0.99) continue;
    const s = getSlice(t);
    const alpha = 0.1 + (1 - t) * 0.65;
    const lw    = 0.4 + (1 - t) * 2.0;
    ctx.beginPath();
    ctx.arc(s.cx, s.cy, s.r, 0, Math.PI);
    ctx.strokeStyle = rimA + alpha + ')';
    ctx.lineWidth = lw;
    ctx.stroke();
  }

  // Front arc always on top
  ctx.beginPath();
  ctx.arc(frontSlice.cx, frontSlice.cy, frontSlice.r, 0, Math.PI);
  ctx.strokeStyle = rimA + '0.9)'; ctx.lineWidth = 3; ctx.stroke();

  const obstaclesCopy = [...obstacles].sort((a, b) => b.z - a.z);
  for (const obstacle of obstaclesCopy) {
    const obstacleCircle = getObstacleCircle(obstacle);
    if ((obstacleCircle.t < 0.01 && obstacle.lingerUntil === null) || obstacleCircle.t > 0.99) continue;

    if (obstacle.hit) {
      ctx.beginPath();
      ctx.arc(obstacleCircle.x, obstacleCircle.y, obstacleCircle.r * settings.hitEffects.hitHaloRadiusMultiplier, 0, Math.PI * 2);
      ctx.strokeStyle = hitHalo;
      ctx.lineWidth = settings.hitEffects.hitHaloLineWidth;
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(obstacleCircle.x, obstacleCircle.y, obstacleCircle.r, 0, Math.PI * 2);
    ctx.fillStyle = obstacleFill;
    ctx.fill();
    ctx.strokeStyle = obstacleStroke;
    ctx.lineWidth = Math.max(1, obstacleCircle.r * 0.25);
    ctx.stroke();
  }

  // Player
  const playerCircle = getPlayerCircle();
  const nx = Math.cos(Math.PI / 2 + playerAngle);
  const ny = Math.sin(Math.PI / 2 + playerAngle);
  const tx = -Math.cos(playerAngle);
  const ty = -Math.sin(playerAngle);
  const leanX = -nx * Math.cos(headingAngle) + tx * Math.sin(headingAngle);
  const leanY = -ny * Math.cos(headingAngle) + ty * Math.sin(headingAngle);
  const playerColor = dark ? '#e8e0ff' : '#3c34a0';
  ctx.beginPath(); ctx.moveTo(playerCircle.x, playerCircle.y);
  ctx.lineTo(playerCircle.x + leanX * settings.player.playerHeight * playerCircle.scale, playerCircle.y + leanY * settings.player.playerHeight * playerCircle.scale);
  ctx.strokeStyle = playerColor; ctx.lineWidth = 3.5 * playerCircle.scale; ctx.lineCap = 'round'; ctx.stroke();
  ctx.beginPath(); ctx.arc(playerCircle.x, playerCircle.y, playerCircle.r, 0, Math.PI * 2);
  ctx.fillStyle = playerColor; ctx.fill();
}

let lastFrameTime = performance.now();

function loop(now = performance.now()) {
  const frameScale = Math.min(2, Math.max(0, (now - lastFrameTime) / (1000 / 60)));
  lastFrameTime = now;

  if (keys['ArrowLeft'])  headingAngle += settings.steering.turnSpeed * frameScale;
  if (keys['ArrowRight']) headingAngle -= settings.steering.turnSpeed * frameScale;
  if (!keys['ArrowLeft'] && !keys['ArrowRight']) {
    const turnReturn = settings.steering.turnReturnSpeed * frameScale;
    if (Math.abs(headingAngle) <= turnReturn) {
      headingAngle = 0;
    } else {
      headingAngle -= Math.sign(headingAngle) * turnReturn;
    }
  }
  headingAngle = Math.max(-settings.steering.maxHeadingAngle, Math.min(settings.steering.maxHeadingAngle, headingAngle));

  slideSpeed += Math.sin(headingAngle) * settings.steering.slideAcceleration * frameScale;
  slideSpeed *= Math.pow(settings.steering.slideFriction, frameScale);
  playerAngle += slideSpeed * frameScale;

  const turnAmount = Math.abs(headingAngle) / settings.steering.maxHeadingAngle;
  const speedAmount = Math.min(1, Math.abs(slideSpeed) / settings.depth.depthSpeedReference);
  const targetDepthT = settings.depth.maxPlayerDepthT * Math.min(1, turnAmount * 0.7 + speedAmount * 0.3);
  const depthEasing = 1 - Math.pow(1 - settings.depth.playerDepthEasing, frameScale);
  playerDepthT += (targetDepthT - playerDepthT) * depthEasing;

  if (playerAngle > Math.PI / 2) {
    playerAngle = Math.PI / 2;
    slideSpeed *= -settings.steering.edgeBounce;
  }
  if (playerAngle < -Math.PI / 2) {
    playerAngle = -Math.PI / 2;
    slideSpeed *= -settings.steering.edgeBounce;
  }

  // Move all arcs forward in Z (toward Z_NEAR), wrap back to Z_FAR when they pass front
  for (let i = 0; i < arcZs.length; i++) {
    arcZs[i] -= settings.tunnel.zSpeed * frameScale;
    if (arcZs[i] <= Z_NEAR) arcZs[i] += (Z_FAR - Z_NEAR);
  }

  nextObstacleInZ -= settings.tunnel.zSpeed * frameScale;
  while (nextObstacleInZ <= 0) {
    spawnObstacle();
    nextObstacleInZ += nextObstacleSpacing();
  }

  const playerCircle = getPlayerCircle();
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const obstacle = obstacles[i];
    if (obstacle.lingerUntil === null) {
      obstacle.z -= settings.tunnel.zSpeed * frameScale;
    }

    const obstacleCircle = getObstacleCircle(obstacle);
    const isCloseInDepth = Math.abs(obstacleCircle.t - playerDepthT) <= settings.obstacles.collisionDepthWindow;
    if (!obstacle.hit && isCloseInDepth && circlesOverlap(playerCircle, obstacleCircle)) {
      obstacle.hit = true;
      avoidedStreak = 0;
      hasHitObstacle = true;
      updateHud();
    }

    if (obstacle.z <= Z_NEAR) {
      if (!obstacle.hit) {
        avoidedStreak++;
        updateHud();
        obstacles.splice(i, 1);
      } else if (obstacle.lingerUntil === null) {
        obstacle.z = Z_NEAR;
        obstacle.lingerUntil = performance.now() + settings.hitEffects.hitLingerMs;
      } else if (performance.now() >= obstacle.lingerUntil) {
        obstacles.splice(i, 1);
      }
    }
  }

  draw();
  requestAnimationFrame(loop);
}

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key.startsWith('Arrow')) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

for (const button of steerButtons) {
  const key = button.dataset.key;
  const setPressed = pressed => { keys[key] = pressed; };

  button.addEventListener('pointerdown', e => {
    e.preventDefault();
    button.setPointerCapture(e.pointerId);
    setPressed(true);
  });
  button.addEventListener('pointerup', () => setPressed(false));
  button.addEventListener('pointercancel', () => setPressed(false));
  button.addEventListener('lostpointercapture', () => setPressed(false));
}

updateHud();
loop();
</script>
